<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#050c1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>📚 SmartLib — Seat Booking Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#050c1a;--bg2:#0a1628;--bg3:#0f1e38;--bg4:#162847;
  --border:#1a2e4a;--border2:#1f3659;
  --text:#e8f0ff;--muted:#4a6589;--muted2:#6b85a8;
  --blue:#3b82f6;--blue2:#1d4ed8;--blue3:#60a5fa;
  --green:#10b981;--green2:#065f46;--green3:#34d399;
  --amber:#f59e0b;--amber2:#92400e;
  --red:#ef4444;--red2:#7f1d1d;
  --purple:#8b5cf6;--cyan:#06b6d4;--pink:#ec4899;
  --r:12px;--r2:8px;--shadow:0 8px 40px rgba(0,0,0,.6);
  --glow-blue:0 0 20px rgba(59,130,246,.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* INPUTS */
.inp{width:100%;padding:11px 14px;border-radius:var(--r2);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.inp::placeholder{color:var(--muted)}
select.inp option{background:var(--bg3)}
textarea.inp{resize:vertical;min-height:80px}

/* SCREEN */
.screen{display:none;animation:screenIn .22s ease}
.screen.active{display:block}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* HEADER */
.header{background:linear-gradient(135deg,#081230 0%,#0c0e3a 100%);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(59,130,246,.12);box-shadow:0 2px 20px rgba(0,0,0,.6)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue2),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.logo-name{font-size:15px;font-weight:800;letter-spacing:.3px}
.logo-sub{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r2);padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;white-space:nowrap;-webkit-appearance:none}
.btn-primary{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.btn-primary:active{transform:translateY(0);box-shadow:none}
.btn-green{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.25)}
.btn-green:hover{transform:translateY(-1px)}
.btn-amber{background:linear-gradient(135deg,var(--amber2),var(--amber));color:#111;box-shadow:0 4px 12px rgba(245,158,11,.25)}
.btn-amber:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--muted2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--bg4)}
.btn-red{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.btn-red:hover{background:rgba(239,68,68,.22)}
.btn-purple{background:linear-gradient(135deg,#4c1d95,var(--purple));color:#fff}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* CONTENT */
.content{padding:18px;max-width:840px;margin:0 auto}

/* ━━ LANDING ━━ */
.landing-hero{text-align:center;padding:44px 20px 24px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue3);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;margin-bottom:18px;letter-spacing:.5px;text-transform:uppercase}
.hero-title{font-size:clamp(26px,6vw,46px);font-weight:800;line-height:1.1;margin-bottom:10px;letter-spacing:-.5px}
.hero-title span{background:linear-gradient(135deg,var(--blue3),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--muted2);font-size:14px;max-width:440px;margin:0 auto 28px;line-height:1.7}
.hero-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.hero-stat{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;text-align:center;min-width:100px}
.hero-stat-val{font-size:22px;font-weight:800;font-family:'Space Mono',monospace}
.hero-stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.landing-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:0;text-align:left}
.land-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.land-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent,#3b82f6) 0%,transparent 60%);opacity:.04;pointer-events:none;transition:opacity .2s}
.land-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.45);border-color:var(--accent,#3b82f6)}
.land-card:hover::after{opacity:.08}
.land-card-icon{font-size:30px;margin-bottom:10px}
.land-card-title{font-weight:800;font-size:16px;margin-bottom:5px}
.land-card-desc{font-size:12px;color:var(--muted2);line-height:1.65}

/* ━━ STEPS PROGRESS ━━ */
.step-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px 10px}
.step-track{display:flex;align-items:center;gap:0;margin-bottom:8px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all .3s;font-family:'Space Mono',monospace}
.step-dot.done{background:var(--green);color:#fff;box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.step-dot.active{background:var(--blue);color:#fff;box-shadow:0 0 0 4px rgba(59,130,246,.2)}
.step-dot.pending{background:var(--bg4);color:var(--muted);border:1.5px solid var(--border2)}
.step-line{flex:1;height:2px;background:var(--border2);margin:0 4px;border-radius:2px;transition:background .3s}
.step-line.done{background:var(--green)}
.step-labels{display:flex;justify-content:space-between;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}

/* ━━ OTP ━━ */
.otp-wrap{max-width:380px;margin:0 auto;padding:24px 18px}
.otp-title{font-size:20px;font-weight:800;margin-bottom:6px;text-align:center}
.otp-sub{font-size:13px;color:var(--muted2);text-align:center;margin-bottom:22px;line-height:1.65}
.otp-inputs{display:flex;gap:8px;justify-content:center;margin:14px 0}
.otp-inp{width:46px;height:54px;text-align:center;font-size:22px;font-weight:800;border-radius:10px;border:2px solid var(--border2);background:var(--bg2);color:var(--text);font-family:'Space Mono',monospace;outline:none;transition:border-color .2s;-webkit-appearance:none}
.otp-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.phone-display{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;color:var(--blue3);margin-bottom:14px;text-align:center;font-family:'Space Mono',monospace}
.demo-otp-box{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.18);border-radius:8px;padding:12px;text-align:center;margin:0 0 14px}

/* ━━ FORM ━━ */
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;color:var(--muted2);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.field-row{grid-template-columns:1fr}}

/* ━━ PHOTO UPLOAD — FIXED ━━ */
.photo-upload-wrap{cursor:pointer}
.photo-upload-box{border:2px dashed var(--border2);border-radius:var(--r2);padding:14px;text-align:center;transition:all .2s;background:var(--bg2);position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.photo-upload-box:hover{border-color:var(--blue);background:rgba(59,130,246,.04)}
.photo-upload-box.has-photo{border-color:var(--green);border-style:solid;background:rgba(16,185,129,.04)}
.photo-preview-img{width:72px;height:72px;border-radius:8px;object-fit:cover;display:block}
.photo-upload-icon{font-size:24px;opacity:.7}
.photo-upload-text{font-size:11px;color:var(--muted2);line-height:1.5}
.photo-upload-hint{font-size:10px;color:var(--amber);font-weight:600}
.photo-success-name{font-size:11px;color:var(--green3);font-weight:700;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ━━ SEAT MAP ━━ */
.seat-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.seat-section-title{font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.seat-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;font-weight:600;padding:10px 12px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px}
.seat-btn{background:var(--bg2);border:1.5px solid var(--border2);border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;position:relative;user-select:none;-webkit-user-select:none}
.seat-btn:hover:not(.occupied):not(.selected){border-color:var(--blue);background:rgba(59,130,246,.08);transform:scale(1.04)}
.seat-btn.available{border-color:#064e3b;background:rgba(16,185,129,.06)}
.seat-btn.available:hover{background:rgba(16,185,129,.14);border-color:var(--green)}
.seat-btn.occupied{border-color:var(--border);background:var(--bg);cursor:not-allowed;opacity:.45}
.seat-btn.selected{border-color:var(--blue);background:rgba(59,130,246,.16);box-shadow:0 0 0 2px rgba(59,130,246,.25);transform:scale(1.04)}
.seat-btn.mine{border-color:var(--amber);background:rgba(245,158,11,.1);cursor:default}
.seat-btn.partial-avail{border-color:#4c1d95;background:rgba(139,92,246,.07)}
.seat-num{font-size:13px;font-weight:800;font-family:'Space Mono',monospace}
.seat-lbl{font-size:7.5px;margin-top:2px;font-weight:700;letter-spacing:.2px;opacity:.65;text-transform:uppercase}

/* ━━ TIMING PANEL ━━ */
.timing-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-top:12px;animation:screenIn .18s ease}
.timing-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border2);margin-bottom:6px;cursor:pointer;transition:all .18s;background:var(--bg3)}
.timing-row:hover:not(.t-taken){border-color:var(--blue);background:rgba(59,130,246,.07)}
.timing-row.t-selected{border-color:var(--blue);background:rgba(59,130,246,.13);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.timing-row.t-taken{opacity:.35;cursor:not-allowed}
.t-label{font-size:13px;font-weight:600}
.t-price{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--green3)}
.t-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.t-avail{background:rgba(16,185,129,.1);color:var(--green3)}
.t-taken-lbl{background:rgba(100,100,100,.1);color:var(--muted)}

/* ━━ PAYMENT ━━ */
.payment-wrap{max-width:460px;margin:0 auto}
.pay-summary{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:14px}
.pay-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)}
.pay-row:last-child{border:none;font-weight:800;font-size:15px;color:var(--green3);padding-top:10px;margin-top:4px}
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-method{border:2px solid var(--border2);border-radius:var(--r2);padding:16px 12px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg3)}
.pay-method:hover{border-color:var(--blue)}
.pay-method.selected{border-color:var(--blue);background:rgba(59,130,246,.08);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.pay-icon{font-size:26px;margin-bottom:6px}
.pay-name{font-size:12px;font-weight:700}
.qr-container{background:#fff;border-radius:12px;padding:16px;text-align:center;margin:10px 0}
.qr-container #qrcode{display:inline-block;margin:0 auto 8px}
.qr-upi{font-size:13px;color:#111;font-weight:700;margin-top:4px}
.qr-name{font-size:11px;color:#444;margin-top:2px}

/* ━━ MY SEAT CARD ━━ */
.my-seat-card{background:linear-gradient(135deg,#0a1e5e 0%,#100c48 100%);border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.my-seat-card::before{content:'📚';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.06}
.my-seat-num{font-size:38px;font-weight:800;font-family:'Space Mono',monospace;color:var(--blue3);line-height:1}
.my-seat-sub{color:var(--muted2);font-size:13px;margin-top:4px}
.days-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-weight:800;font-size:12px;margin-top:8px}

/* ━━ SUCCESS ━━ */
.success-wrap{text-align:center;padding:28px 18px}
.success-icon{font-size:60px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-title{font-size:22px;font-weight:800;margin-bottom:6px;color:var(--green3)}
.success-sub{color:var(--muted2);font-size:13px;line-height:1.7}
.receipt{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r);padding:14px;margin:18px 0;text-align:left}
.receipt-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.receipt-row:last-child{border:none;font-weight:800;color:var(--green3);margin-top:4px;font-size:14px}

/* ━━ MODAL ━━ */
.overlay{position:fixed;inset:0;background:rgba(2,6,16,.9);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;z-index:400;animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(min-width:540px){.overlay{align-items:center;padding:16px}}
.modal{background:var(--bg3);border-radius:18px 18px 0 0;padding:20px 20px 30px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border:1px solid var(--border2);border-bottom:none;animation:slideUp .22s ease}
@media(min-width:540px){.modal{border-radius:18px;border-bottom:1px solid var(--border2)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:.4}to{transform:none;opacity:1}}
.drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
@media(min-width:540px){.drag{display:none}}
.modal-head{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-acts{display:flex;gap:8px;margin-top:6px}

/* ━━ TOAST ━━ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:50px;font-weight:700;font-size:13px;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;animation:toastIn .25s ease;pointer-events:none;font-family:'Plus Jakarta Sans',sans-serif}
@keyframes toastIn{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast.ok{background:var(--green);color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.35)}
.toast.err{background:var(--red);color:#fff;box-shadow:0 6px 20px rgba(239,68,68,.35)}
.toast.info{background:var(--blue);color:#fff;box-shadow:0 6px 20px rgba(59,130,246,.35)}

/* ━━ NAV ━━ */
.top-nav{display:flex;gap:2px;padding:10px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.top-nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 16px;border:none;border-radius:8px 8px 0 0;font-weight:600;font-size:13px;white-space:nowrap;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;position:relative}
.nav-btn.active{background:var(--bg);color:var(--blue3)}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--blue);border-radius:2px 2px 0 0}
.nav-btn:not(.active){background:transparent;color:var(--muted)}
.nav-btn:not(.active):hover{color:var(--text);background:rgba(255,255,255,.04)}

/* ━━ STAT CARDS ━━ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:-18px;right:-18px;width:56px;height:56px;border-radius:50%;background:var(--accent,var(--blue));opacity:.07}
.stat-val{font-size:24px;font-weight:800;color:var(--accent,var(--blue));font-family:'Space Mono',monospace}
.stat-label{font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}

/* ━━ MEMBER CARD ━━ */
.member-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;border-left:3px solid var(--seat-color,var(--blue));transition:all .18s}
.member-card:hover{box-shadow:var(--shadow);border-color:rgba(59,130,246,.25)}
.mc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.seat-badge{border-radius:6px;padding:3px 9px;font-weight:800;font-size:12px;color:#111;font-family:'Space Mono',monospace}
.name-txt{font-weight:700;font-size:14px}
.pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.2px}
.pill-active{background:rgba(16,185,129,.1);color:var(--green3)}
.pill-warn{background:rgba(245,158,11,.1);color:var(--amber)}
.pill-crit{background:rgba(239,68,68,.1);color:var(--red)}
.pill-exp{background:rgba(100,116,139,.1);color:var(--muted)}
.mc-meta{font-size:12px;color:var(--muted2);display:flex;flex-wrap:wrap;gap:10px}
.mc-acts{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}

/* ━━ SEARCH ━━ */
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-wrap{flex:1;position:relative}
.search-wrap .inp{padding-left:34px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}

/* ━━ SECTION BOX ━━ */
.section-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.sec-title{font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:12px}

/* ━━ MISC ━━ */

// Seat 26 aur 48 completely hidden — dono sides se (student + admin)
const HIDDEN_SEATS = [26, 48];

const T4 = ["6:15 AM – 10:15 AM","10:15 AM – 2:15 PM","2:15 PM – 6:15 PM","6:15 PM – 10:15 PM"];
const T6 = ["6:15 AM – 10:15 AM","10:15 AM – 4:15 PM","4:15 PM – 10:15 PM"];

function catOf(n){n=+n;if(n>=1&&n<=20)return"4hr";if(n>=21&&n<=25)return"6hr";if(n>=27&&n<=47||n>=49&&n<=100)return"res";return null}
function timingsOf(n){let c=catOf(n);return c==="4hr"?T4:c==="6hr"?T6:[]}
function feeOf(n,t){
  if(HIDDEN_SEATS.includes(+n))return 0;
  let c=catOf(n);
  if(c==="4hr")return 400;
  if(c==="6hr")return t==="6:15 AM – 10:15 AM"?400:600;
  if(c==="res")return 900;
  return 0;
}
function labelOf(n,t){
  let c=catOf(n);
  if(c==="4hr")return"4 Ghante Slot";
  if(c==="6hr")return t==="6:15 AM – 10:15 AM"?"4 Ghante Slot":"6 Ghante Slot";
  if(c==="res")return"Reserved Seat (Full Day)";
  return"";
}
function colorOf(n){let c=catOf(n);return c==="4hr"?"#f59e0b":c==="6hr"?"#a78bfa":c==="res"?"#34d399":"#64748b"}
function todayStr(){return new Date().toISOString().split("T")[0]}
function addMonth(ds){let d=new Date(ds||todayStr());d.setMonth(d.getMonth()+1);return d.toISOString().split("T")[0]}
function fmtDate(ds){if(!ds)return"—";return new Date(ds).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}
function daysLeft(rd){let t=new Date();t.setHours(0,0,0,0);let r=new Date(rd);r.setHours(0,0,0,0);return Math.ceil((r-t)/86400000)}
function statusOf(dl){if(dl<0)return"expired";if(dl<=3)return"critical";if(dl<=7)return"warning";return"active"}
function isTaken(members,seatNum,timing,excludeId){
  if(catOf(seatNum)==="res")return members.some(m=>+m.seatNumber===+seatNum&&m.id!==excludeId);
  return members.some(m=>+m.seatNumber===+seatNum&&m.timing===timing&&m.id!==excludeId);
}
function isSeatFullyBooked(members,seatNum){
  let timings=timingsOf(seatNum);
  if(timings.length===0)return members.some(m=>+m.seatNumber===+seatNum);
  return timings.every(t=>members.some(m=>+m.seatNumber===+seatNum&&m.timing===t));
}

const JBIN_KEY  = "$2a$10$VG0edm4klaYSIlXlb3gAteOZkHFoLxTy9amD9pCQFm.Kafz4T4QbK";
// JBIN_BIN — pehli baar "JSONBIN_BIN_ID_HERE", phir localStorage se
let JBIN_BIN = localStorage.getItem("sl_bin") || "JSONBIN_BIN_ID_HERE";
let   _jbinSaving = false;

async function jbinGet(){
  try{
    JBIN_BIN=localStorage.getItem("sl_bin")||JBIN_BIN;
  let r=await fetch("https://api.jsonbin.io/v3/b/"+JBIN_BIN+"/latest",
      {headers:{"X-Master-Key":JBIN_KEY,"X-Bin-Meta":"false"}});
    if(!r.ok)throw new Error("fetch fail");
    return await r.json();
  }catch(e){return null}
}

async function jbinSet(d){
  if(_jbinSaving)return;
  _jbinSaving=true;
  // Photos hata ke save karo (file size bahut badi ho jaati)
  let clean={members:d.members.map(m=>{
    let c=Object.assign({},m);delete c.passportPhoto;delete c.aadhaarPhoto;return c;
  })};
  // Photos locally rakhte hain
  let photos={};
  d.members.forEach(m=>{
    if(m.passportPhoto)photos[m.id+"_p"]=m.passportPhoto;
    if(m.aadhaarPhoto) photos[m.id+"_a"]=m.aadhaarPhoto;
  });
  try{localStorage.setItem("sl_ph",JSON.stringify(photos));}catch(e){}
  try{
    let r=await fetch("https://api.jsonbin.io/v3/b/"+JBIN_BIN,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JBIN_KEY},
      body:JSON.stringify(clean)
    });
    if(!r.ok)throw new Error("save fail");
  }catch(e){
    // Fallback: localStorage
    try{localStorage.setItem(SK,JSON.stringify(d));}catch(le){}
  }finally{_jbinSaving=false;}
}

function mergePhotos(d){
  let ph={};
  try{ph=JSON.parse(localStorage.getItem("sl_ph")||"{}");}catch(e){}
  d.members=d.members.map(m=>Object.assign({},m,{
    passportPhoto:ph[m.id+"_p"]||null,
    aadhaarPhoto :ph[m.id+"_a"]||null
  }));
  return d;
}

function loadData(){
  try{let d=JSON.parse(localStorage.getItem(SK)||"{}");return d.members?d:{members:[]};}
  catch{return{members:[]};}
}
function saveData(d){
  // Local save turant (fast UI)
  try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
  // Online save (async, background)
  jbinSet(d);
}
function enriched(){
  return data.members.map(m=>{let dl=daysLeft(m.renewalDate);return{...m,daysLeft:dl,status:statusOf(dl),seatType:labelOf(m.seatNumber,m.timing)}});
}

// STATE
// ══════════════════════════════════════════════
let data = loadData();
let state = {
  screen:"landing", adminView:"dashboard",
  regStep:"phone", isAdmin:false, currentStudent:null,
  phoneInput:"", otpSent:false, otpCode:"", otpInput:"",
  regForm:{name:"",fatherName:"",aadhaar:"",address:"",passportPhoto:null,passportPhotoName:"",aadhaarPhoto:null,aadhaarPhotoName:"",admissionDate:todayStr()},
  selectedSeat:null, selectedTiming:null, paymentMethod:null,

  search:"", filterStatus:"all",
  showForm:false, editId:null,
  adminForm:{seatNumber:"",timing:"",admissionDate:todayStr()},
  adminFormText:{name:"",phone:"",cnic:"",fatherName:"",address:"",notes:""},
  confirmRenew:null, confirmDelete:null, showBackup:false,
  toast:null, adminPassInput:"", showAdminLogin:false,
};

function setState(patch){state={...state,...patch};render()}

// ══════════════════════════════════════════════
// DOM HELPER
// ══════════════════════════════════════════════
function h(tag,attrs,...children){
  let el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="disabled")el.disabled=v;
    else if(k==="value"&&(tag==="input"||tag==="select"||tag==="textarea"))el.value=v||"";
    else if(k==="checked")el.checked=v;
    else if(k==="dataset")Object.entries(v).forEach(([dk,dv])=>el.dataset[dk]=dv);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

let _toast=null;
function showToast(text,type="ok"){
  if(_toast)clearTimeout(_toast);
  setState({toast:{text,type}});
  _toast=setTimeout(()=>setState({toast:null}),3200);
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  let saveSearch=null,saveSel=[null,null];
  let ae=document.activeElement;
  if(ae&&ae.dataset&&ae.dataset.persist){saveSearch=ae.dataset.persist;try{saveSel=[ae.selectionStart,ae.selectionEnd]}catch(e){}}
  let app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(buildHeader());
  if(state.screen==="landing")app.appendChild(buildLanding());
  else if(state.screen==="student")app.appendChild(buildStudentPortal());
  else if(state.screen==="admin")app.appendChild(buildAdminPortal());
  if(state.showAdminLogin)app.appendChild(buildAdminLoginModal());
  if(state.confirmRenew)app.appendChild(buildRenewModal());
  if(state.confirmDelete)app.appendChild(buildDeleteModal());
  if(state.showForm&&state.isAdmin)app.appendChild(buildAdminFormModal());
  if(state.showBackup)app.appendChild(buildBackupModal());
  if(state.toast){app.appendChild(h("div",{className:"toast "+state.toast.type},state.toast.text))}
  if(saveSearch){let el=app.querySelector(`[data-persist="${saveSearch}"]`);if(el){el.focus();try{el.setSelectionRange(saveSel[0],saveSel[1])}catch(e){}}}
  setTimeout(()=>{
    let qrDiv=document.getElementById("qrcode");
    if(qrDiv&&qrDiv.innerHTML===""){
      let amount=feeOf(state.selectedSeat,state.selectedTiming);
      let upiUrl=`upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(UPI_NAME)}&am=${amount}&cu=INR&tn=Library+Seat+Booking`;
      try{new QRCode(qrDiv,{text:upiUrl,width:140,height:140,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M})}catch(e){}
    }
  },100);
}

// ══════════════════════════════════════════════
// HEADER
// ══════════════════════════════════════════════
function buildHeader(){
  let em=enriched();
  let expC=em.filter(m=>m.status==="expired").length;
  let wrap=h("div",{});
  if(expC>0&&state.isAdmin){
    let alert=h("div",{className:"renew-alert"});
    alert.appendChild(h("span",{},"⚠️"));
    alert.appendChild(h("span",{className:"badge"},expC+" Expired"));
    alert.appendChild(h("span",{style:{color:"rgba(245,158,11,.8)"}},"members ki renewal pending hai!"));
    wrap.appendChild(alert);
  }
  let header=h("div",{className:"header"});
  let left=h("div",{className:"logo"});
  left.appendChild(h("div",{className:"logo-icon"},"📚"));
  let linfo=h("div",{});
  linfo.appendChild(h("div",{className:"logo-name"},"SmartLib"));
  linfo.appendChild(h("div",{className:"logo-sub"},"Seat Booking Portal"));
  left.appendChild(linfo);
  header.appendChild(left);
  let right=h("div",{className:"header-right"});
  if(state.isAdmin){
    right.appendChild(h("span",{className:"admin-label"},"🔐 Admin"));
    right.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>setState({isAdmin:false,screen:"landing",adminView:"dashboard"})},"Exit"));
  } else if(state.currentStudent){
    let m=data.members.find(m=>m.id===state.currentStudent);
    right.appendChild(h("span",{style:{fontSize:"12px",color:"var(--muted2)",fontWeight:"700"}},m?m.name.split(" ")[0]:""));
    right.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>setState({currentStudent:null,screen:"landing",regStep:"phone",selectedSeat:null,selectedTiming:null})},"Logout"));
  } else if(state.screen!=="landing"){
    right.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>setState({screen:"landing"})},"← Wapas"));
  }
  header.appendChild(right);
  wrap.appendChild(header);
  return wrap;
}

// ══════════════════════════════════════════════
// LANDING
// ══════════════════════════════════════════════
function buildLanding(){
  let em=enriched();
  // Count available excluding hidden seats
  let allSlots=[];
  for(let i=1;i<=100;i++){
    if(HIDDEN_SEATS.includes(i))continue;
    let cat=catOf(i);
    if(!cat)continue;
    let ts=timingsOf(i);
    if(ts.length>0)ts.forEach(t=>allSlots.push(i+"_"+t));
    else allSlots.push(i+"_res");
  }
  let takenSlots=data.members.reduce((acc,m)=>{acc.add(m.seatNumber+"_"+(m.timing||"res"));return acc},new Set());
  let availSlots=allSlots.length-takenSlots.size;

  let wrap=h("div",{});
  let hero=h("div",{className:"landing-hero"});
  hero.appendChild(h("div",{className:"hero-badge"},"🏛️ Library Seat Portal"));
  let title=h("div",{className:"hero-title"});
  title.innerHTML="Ghar Baithe<br><span>Seat Book Karo!</span>";
  hero.appendChild(title);
  hero.appendChild(h("div",{className:"hero-sub"},"Mobile OTP se verify karo, apni seat chunao, UPI se payment karo. Bilkul aasaan — sab online!"));

  let statsRow=h("div",{className:"hero-stats"});
  [{v:data.members.length,l:"Members",c:"#3b82f6"},{v:availSlots,l:"Available",c:"#10b981"},{v:takenSlots.size,l:"Booked",c:"#f59e0b"}].forEach(s=>{
    let sc=h("div",{className:"hero-stat"});
    sc.appendChild(h("div",{className:"hero-stat-val",style:{color:s.c}},s.v));
    sc.appendChild(h("div",{className:"hero-stat-lbl"},s.l));
    statsRow.appendChild(sc);
  });
  hero.appendChild(statsRow);
  wrap.appendChild(hero);

  let cards=h("div",{className:"landing-cards content"});

  let sc=h("div",{className:"land-card",style:{"--accent":"#3b82f6"},onClick:()=>{
    if(state.currentStudent)setState({screen:"student",regStep:"seat"});
    else setState({screen:"student",regStep:"phone"});
  }});
  sc.appendChild(h("div",{className:"land-card-icon"},"🎓"));
  sc.appendChild(h("div",{className:"land-card-title"},"Student Portal"));
  sc.appendChild(h("div",{className:"land-card-desc"},"Mobile OTP se verify karo, seat book karo, renewal karo. Puri process online!"));
  sc.appendChild(h("button",{className:"btn btn-primary",style:{marginTop:"14px",pointerEvents:"none"}},state.currentStudent?"My Dashboard →":"Register / Login →"));
  cards.appendChild(sc);

  let ac=h("div",{className:"land-card",style:{"--accent":"#f59e0b"},onClick:()=>{
    if(state.isAdmin)setState({screen:"admin"});
    else setState({showAdminLogin:true});
  }});
  ac.appendChild(h("div",{className:"land-card-icon"},"🔐"));
  ac.appendChild(h("div",{className:"land-card-title"},"Admin Panel"));
  ac.appendChild(h("div",{className:"land-card-desc"},"Sab members ka record, renewals, payments, backup aur poori library manage karo."));
  ac.appendChild(h("button",{className:"btn btn-amber",style:{marginTop:"14px",pointerEvents:"none"}},state.isAdmin?"Admin Dashboard →":"Admin Login →"));
  cards.appendChild(ac);

  wrap.appendChild(cards);
  return wrap;
}

// ══════════════════════════════════════════════
// STUDENT PORTAL
// ══════════════════════════════════════════════
function buildStudentPortal(){
  let wrap=h("div",{});
  wrap.appendChild(buildStepNav());
  let content=h("div",{className:"content"});
  if(state.regStep==="phone")content.appendChild(buildPhoneStep());
  else if(state.regStep==="otp")content.appendChild(buildOTPStep());
  else if(state.regStep==="register")content.appendChild(buildRegisterStep());
  else if(state.regStep==="seat"){
    if(state.currentStudent){
      let m=enriched().find(m=>m.id===state.currentStudent);
      if(m)content.appendChild(buildMySeatCard(m));
    }
    content.appendChild(buildSeatMapStep());
  }
  else if(state.regStep==="payment")content.appendChild(buildPaymentStep());
  else if(state.regStep==="success")content.appendChild(buildSuccessStep());
  wrap.appendChild(content);
  return wrap;
}

function buildStepNav(){
  let steps=[
    {id:"phone",n:1,l:"Phone"},
    {id:"otp",n:2,l:"OTP"},
    {id:"register",n:3,l:"Details"},
    {id:"seat",n:4,l:"Seat"},
    {id:"payment",n:5,l:"Payment"},
    {id:"success",n:6,l:"Done"}
  ];
  let order=["phone","otp","register","seat","payment","success"];
  let curIdx=order.indexOf(state.regStep);
  let nav=h("div",{className:"step-nav"});
  let track=h("div",{className:"step-track"});
  steps.forEach((s,i)=>{
    let cls="step-dot "+(i<curIdx?"done":i===curIdx?"active":"pending");
    let dot=h("div",{className:cls},i<curIdx?"✓":String(s.n));
    track.appendChild(dot);
    if(i<steps.length-1){
      let line=h("div",{className:"step-line"+(i<curIdx?" done":"")});
      track.appendChild(line);
    }
  });
  nav.appendChild(track);
  let labels=h("div",{className:"step-labels"});
  steps.forEach((s,i)=>labels.appendChild(h("span",{style:{color:i<=curIdx?"var(--text)":"var(--muted)",transition:"color .3s"}},s.l)));
  nav.appendChild(labels);
  return nav;
}

// STEP 1: PHONE
function buildPhoneStep(){
  let wrap=h("div",{className:"otp-wrap"});
  wrap.appendChild(h("div",{style:{fontSize:"36px",textAlign:"center",marginBottom:"10px"}},"📱"));
  wrap.appendChild(h("div",{className:"otp-title"},"Mobile Number Darj Karein"));
  wrap.appendChild(h("div",{className:"otp-sub"},"Apna number enter karein. Agar pehle se member hain toh OTP se login hoga, warna registration shuru hogi."));
  let phoneF=h("div",{className:"field"});
  phoneF.appendChild(h("label",{},"Mobile Number *"));
  phoneF.appendChild(h("input",{className:"inp",type:"tel",placeholder:"9876543210",value:state.phoneInput,dataset:{persist:"reg-phone"},onInput:e=>state.phoneInput=e.target.value,onKeydown:e=>{if(e.key==="Enter")sendOTP()}}));
  wrap.appendChild(phoneF);
  wrap.appendChild(h("button",{className:"btn btn-primary btn-full",style:{marginTop:"4px"},onClick:()=>sendOTP()},"OTP Bhejo →"));
  let hint=h("div",{style:{marginTop:"18px",padding:"14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--r2)",fontSize:"12px",color:"var(--muted2)",lineHeight:"1.75"}});
  hint.appendChild(h("div",{style:{fontWeight:"700",color:"var(--text)",marginBottom:"6px"}},"💡 Kaise kaam karta hai?"));
  hint.appendChild(h("div",{},"• Naye student: Register karke seat book karein"));
  hint.appendChild(h("div",{},"• Purane member: OTP se login karein"));
  wrap.appendChild(hint);
  return wrap;
}

function sendOTP(){
  let inp=document.querySelector('[data-persist="reg-phone"]');
  let phone=inp?inp.value.trim():state.phoneInput.trim();
  if(!phone||phone.length<10){showToast("Sahi mobile number daalo!","err");return}
  state.phoneInput=phone;
  let otp=Math.floor(100000+Math.random()*900000).toString();
  state.otpCode=otp;state.otpInput="";
  setState({regStep:"otp",otpSent:true});
  setTimeout(()=>showToast("OTP: "+otp+" (Demo mode)","info"),200);
}

// STEP 2: OTP
function buildOTPStep(){
  let wrap=h("div",{className:"otp-wrap"});
  wrap.appendChild(h("div",{style:{fontSize:"36px",textAlign:"center",marginBottom:"10px"}},"🔢"));

// PHOTO INPUT — PROPER FIX using hidden input approach
function triggerPhotoInput(type){
  let inp=document.createElement("input");
  inp.type="file";
  inp.accept="image/*,application/pdf";
  inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px";
  document.body.appendChild(inp);
  inp.addEventListener("change",function(e){
    let file=e.target.files[0];
    if(!file){document.body.removeChild(inp);return}
    // Size check - only for passport photo (100KB limit removed, now 500KB for better compatibility)
    if(file.size>5*1024*1024){showToast("File 5MB se choti honi chahiye!","err");document.body.removeChild(inp);return}
    let reader=new FileReader();
    reader.onload=function(ev){
      if(type==="passport"){
        state.regForm.passportPhoto=ev.target.result;
        state.regForm.passportPhotoName=file.name;
      } else {
        state.regForm.aadhaarPhoto=ev.target.result;
        state.regForm.aadhaarPhotoName=file.name;
      }
      document.body.removeChild(inp);
      render();
      showToast(type==="passport"?"Passport photo upload! ✅":"Aadhaar photo upload! ✅");
    };
    reader.onerror=function(){showToast("Photo load nahi hui. Dobara try karein.","err");document.body.removeChild(inp);}
    reader.readAsDataURL(file);
  });
  // Trigger click with a small delay for iOS
  setTimeout(()=>inp.click(),50);
}

function buildSeatSection(title,from,to){
  let section=h("div",{className:"seat-section"});
  section.appendChild(h("div",{className:"seat-section-title"},title));
  let grid=h("div",{className:"seat-grid"});
  let anyVisible=false;
  for(let i=from;i<=to;i++){
    if(HIDDEN_SEATS.includes(i))continue; // ← Completely hidden, no trace
    let cat=catOf(i);
    if(!cat)continue;
    anyVisible=true;
    let full=isSeatFullyBooked(data.members,i);
    let isMine=state.currentStudent&&data.members.some(m=>m.id===state.currentStudent&&+m.seatNumber===i);
    let timings=timingsOf(i);
    let partialAvail=!full&&timings.length>0&&timings.some(t=>!isTaken(data.members,i,t,null));
    let clsArr=["seat-btn"];
    if(isMine)clsArr.push("mine");
    else if(full)clsArr.push("occupied");
    else if(state.selectedSeat===i)clsArr.push("selected");
    else if(partialAvail&&timings.length>0)clsArr.push("partial-avail");
    else clsArr.push("available");

    let btn=h("div",{className:clsArr.join(" "),onClick:()=>{
      if(full&&!isMine){showToast("Seat #"+i+" full booked hai!","err");return}
      if(isMine){showToast("Yeh aapki current seat hai!","info");return}
      if(catOf(i)==="res")setState({selectedSeat:i,selectedTiming:""});
      else setState({selectedSeat:i,selectedTiming:null});
    }});
    btn.appendChild(h("div",{className:"seat-num"},i));
    btn.appendChild(h("div",{className:"seat-lbl"},full?"FULL":isMine?"MINE":catOf(i)==="res"?"RES":""));
    grid.appendChild(btn);
  }
  if(!anyVisible){section.style.display="none"}
  section.appendChild(grid);
  return section;
}

    } else {

function downloadPDF(m){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    let y=20;
    doc.setFillColor(5,12,26);doc.rect(0,0,210,42,"F");
    doc.setTextColor(220,232,255);doc.setFontSize(20);doc.setFont("helvetica","bold");
    doc.text("SmartLib — Seat Booking Receipt",15,18);
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    doc.text("Seat Booking Portal",15,27);doc.text("Generated: "+new Date().toLocaleString("en-IN"),15,34);
    y=54;
    doc.setFillColor(240,245,255);doc.rect(10,y-8,190,128,"F");
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(29,78,216);
    doc.text("Member Details",15,y);y+=10;
    doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(30,30,50);
    [["Naam",m.name],["Father's Name",m.fatherName||"—"],["Mobile",m.phone],["Aadhaar",m.aadhaar?m.aadhaar.replace(/(\d{4})(\d{4})(\d{4})/,"$1 $2 $3"):"—"],["Address",m.address||"—"],["Seat Number","#"+m.seatNumber],["Timing",m.timing||"Full Day (Reserved)"],["Seat Type",m.seatType],["Admission",fmtDate(m.admissionDate)],["Valid Until",fmtDate(m.renewalDate)],["Payment",m.paymentMethod==="upi"?"UPI / QR Code":"Cash"],["Amount Paid","Rs. "+m.fee+"/-"]].forEach(([k,v])=>{
      doc.setFont("helvetica","bold");doc.text(k+":",15,y);
      doc.setFont("helvetica","normal");doc.text(String(v||""),80,y);
      y+=9;
    });
    y+=8;
    doc.setFillColor(29,78,216);doc.rect(10,y,190,1,"F");
    y+=8;doc.setFontSize(10);doc.setTextColor(100,100,100);
    doc.text("UPI: "+UPI_ID+" | Name: "+UPI_NAME,15,y);y+=8;
    doc.text("Yeh receipt aapki seat booking ka pramaan hai.",15,y);
    if(m.passportPhoto){try{doc.addImage(m.passportPhoto,"JPEG",166,46,28,34);doc.setFontSize(8);doc.setTextColor(100,100,100);doc.text("Photo",170,83);}catch(e){}}
    doc.save("SmartLib-Seat"+m.seatNumber+"-"+m.name.replace(/\s+/g,"-")+".pdf");
    showToast("PDF download ho raha hai! ✓");
  }catch(e){console.error(e);showToast("PDF error! Print option try karein.","err")}
}

</div>
<div class="footer">UPI: ${UPI_ID} | ${UPI_NAME}<br>Yeh receipt aapki seat booking ka pramaan hai.</div>

    let sn=e.target.value;let ts=timingsOf(sn);let firstAvail="";
    if(ts.length>0){for(let t of ts){if(!isTaken(data.members,sn,t,state.editId)){firstAvail=t;break;}}}
    state.adminForm={...state.adminForm,seatNumber:sn,timing:firstAvail};render();
  }});
  seatSel.appendChild(h("option",{value:""},"— Seat Chunao —"));
  for(let i=1;i<=100;i++){
    if(HIDDEN_SEATS.includes(i))continue; // Admin can't assign hidden seats
    let cat=catOf(i);if(!cat)continue;
    let opt=h("option",{value:String(i)},"#"+i+" | "+(labelOf(i,"")||"Reserved")+(cat==="4hr"?" ₹400":cat==="6hr"?" ₹400–600":" ₹900"));
    if(String(i)===state.adminForm.seatNumber)opt.selected=true;
    seatSel.appendChild(opt);
  }

    let tf=h("div",{className:"field"});

    timingsOf(state.adminForm.seatNumber).forEach(t=>{
      let taken=isTaken(data.members,state.adminForm.seatNumber,t,state.editId);
      let isSelected=state.adminForm.timing===t;
      let row=h("div",{className:"timing-row"+(isSelected?" t-selected":taken?" t-taken":""),onClick:()=>{if(!taken){state.adminForm.timing=t;render()}}});

}

function saveAdminMember(){
  let ni=document.querySelector('[data-persist="a-name"]');if(ni)state.adminFormText.name=ni.value;
  let f={...state.adminFormText,...state.adminForm};
  if(!f.name.trim()){showToast("Naam zaroori hai!","err");return}
  if(!f.phone.trim()){showToast("Phone zaroori hai!","err");return}
  if(!f.seatNumber){showToast("Seat chunao!","err");return}
  if(HIDDEN_SEATS.includes(+f.seatNumber)){showToast("Yeh seat available nahi hai!","err");return}
  if(catOf(f.seatNumber)!=="res"&&!f.timing){showToast("Timing chunao!","err");return}
  if(isTaken(data.members,f.seatNumber,f.timing,state.editId)){showToast("Yeh slot occupied hai!","err");return}
  let fee=feeOf(f.seatNumber,f.timing);
  let renewalDate=addMonth(f.admissionDate);
  if(state.editId){
    data.members=data.members.map(m=>m.id===state.editId?{...m,name:f.name,fatherName:f.fatherName,phone:f.phone,aadhaar:f.cnic,address:f.address,seatNumber:f.seatNumber,timing:f.timing,admissionDate:f.admissionDate,fee,seatType:labelOf(f.seatNumber,f.timing),renewalDate}:m);
    showToast("Member update ho gaya ✓");
  } else {
    data.members.push({id:Date.now(),name:f.name,fatherName:f.fatherName,phone:f.phone,aadhaar:f.cnic,address:f.address,seatNumber:f.seatNumber,timing:f.timing,admissionDate:f.admissionDate,fee,seatType:labelOf(f.seatNumber,f.timing),renewalDate,paymentMethod:"cash",renewalHistory:[]});
    showToast("Member add ho gaya ✓");
  }
  saveData(data);setState({showForm:false});
}

  else showToast("Galat password!","err");

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(state.showForm)setState({showForm:false});
    else if(state.confirmRenew)setState({confirmRenew:null});
    else if(state.confirmDelete)setState({confirmDelete:null});
    else if(state.showBackup)setState({showBackup:false});
    else if(state.showAdminLogin)setState({showAdminLogin:false,adminPassInput:""});
  }
});

// ══════════════════════════════════════════════
// STARTUP — JSONBin se online data load karo
// ══════════════════════════════════════════════
(async function startup(){
  // Loading overlay dikhao
  let loader=document.createElement("div");
  loader.id="sl-load";
  loader.innerHTML='<div style="position:fixed;inset:0;background:#050c1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px">'
    +'<div style="font-size:48px">📚</div>'
    +'<div style="color:#e8f0ff;font-size:20px;font-weight:800;font-family:sans-serif">SmartLib</div>'
    +'<div style="color:#4a6589;font-size:12px;font-family:sans-serif" id="sl-load-txt">Online data load ho raha hai...</div>'
    +'<style>.sl-sp{width:38px;height:38px;border:3px solid #1a2e4a;border-top:3px solid #3b82f6;border-radius:50%;animation:slr .7s linear infinite}@keyframes slr{to{transform:rotate(360deg)}}</style>'
    +'<div class="sl-sp"></div></div>';
  document.body.appendChild(loader);

  function rmLoader(){let l=document.getElementById("sl-load");if(l){l.style.transition="opacity .3s";l.style.opacity="0";setTimeout(()=>l.remove(),320);}}
  function setTxt(t){let el=document.getElementById("sl-load-txt");if(el)el.textContent=t;}

  // Pehle check karo ki JSONBin configured hai ya nahi
  if(JBIN_BIN==="JSONBIN_BIN_ID_HERE"){
    // Pehli baar — nayi bin create karo
    setTxt("Pehli baar setup ho raha hai...");
    try{
      let r=await fetch("https://api.jsonbin.io/v3/b",{
        method:"POST",
        headers:{"Content-Type":"application/json","X-Master-Key":JBIN_KEY,"X-Bin-Name":"SmartLib-Data","X-Collection-Id":"","X-Private":"false"},
        body:JSON.stringify({members:[]})
      });
      if(r.ok){
        let j=await r.json();
        let binId=j.metadata.id;
        // Bin ID script mein hi replace karo (self-patching!)
        // Aur localStorage mein save karo
        localStorage.setItem("sl_bin",binId);
        // Global variable update karo
        window._jbinId=binId;
        Object.defineProperty(window,"JBIN_BIN",{get:function(){return localStorage.getItem("sl_bin")||"JSONBIN_BIN_ID_HERE";}});
        setTxt("Setup complete! Shuru ho raha hai...");
      }
    }catch(e){setTxt("Offline mode mein chal raha hai");}
  } else {
    // Bin ID already set hai, ya localStorage mein hai
    let stored=localStorage.getItem("sl_bin");
    if(stored)Object.defineProperty(window,"JBIN_BIN",{get:function(){return stored;},configurable:true});
  }

  // Online se data load karo
  let binId=localStorage.getItem("sl_bin");
  if(binId&&binId!=="JSONBIN_BIN_ID_HERE"){
    setTxt("Members data aa raha hai...");
    let online=await jbinGet();
    if(online&&online.members){
      online=mergePhotos(online);
      data=online;
      try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}
    }
  }

  rmLoader();
  render();
})();
</script>
